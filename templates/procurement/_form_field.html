{% comment %}One labelled form field with help text and errors. Params: field, optional label.{% endcomment %}
<div>
  <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-gray-700">{{ label|default:field.label }}</label>
  <div class="mt-1">{{ field }}</div>
  {% if field.help_text %}<p class="mt-1 text-xs text-gray-500">{{ field.help_text }}</p>{% endif %}
  {% for error in field.errors %}<p class="mt-1 text-xs text-red-600">{{ error }}</p>{% endfor %}
</div>
