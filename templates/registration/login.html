{% extends "base.html" %}

{% block title %}Sign in · LabButler{% endblock %}

{% block content %}
  <div class="mx-auto max-w-sm">
    <h1 class="text-xl font-semibold">Sign in</h1>
    {% if form.errors %}
      <p class="mt-2 text-sm text-red-600">Invalid email or password.</p>
    {% endif %}
    <form method="post" class="mt-4 space-y-3">
      {% csrf_token %}
      {% for field in form %}
        <div>
          <label class="block text-sm font-medium" for="{{ field.id_for_label }}">{{ field.label }}</label>
          {{ field }}
        </div>
      {% endfor %}
      <button type="submit" class="rounded bg-teal-600 px-4 py-2 text-sm text-white">Sign in</button>
    </form>
  </div>
{% endblock %}
