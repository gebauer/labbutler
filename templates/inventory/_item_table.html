<div class="overflow-x-auto rounded-xl border border-gray-200 bg-white shadow-sm">
  <table class="min-w-full divide-y divide-gray-200 text-sm">
    <thead class="bg-gray-50 text-left text-xs uppercase tracking-wide text-gray-500">
      <tr>
        <th class="px-4 py-2.5 font-medium">ID</th>
        <th class="px-4 py-2.5 font-medium">Name</th>
        <th class="px-4 py-2.5 font-medium">Location</th>
        <th class="px-4 py-2.5 font-medium">Supplier</th>
        <th class="px-4 py-2.5 font-medium">Expires</th>
      </tr>
    </thead>
    <tbody class="divide-y divide-gray-100">
      {% for item in page.object_list %}
        <tr class="hover:bg-teal-50/40">
          <td class="whitespace-nowrap px-4 py-2.5 font-mono text-xs text-gray-500">
            <a href="{% url 'inventory:item_detail' item.pk %}" class="hover:text-teal-700 hover:underline">{{ item.human_id }}</a>
          </td>
          <td class="px-4 py-2.5">
            <a href="{% url 'inventory:item_detail' item.pk %}" class="font-medium text-gray-900 hover:text-teal-700">{{ item.name }}</a>
          </td>
          <td class="px-4 py-2.5 text-gray-600">{{ item.location.name|default:"—" }}</td>
          <td class="px-4 py-2.5 text-gray-600">{{ item.vendor.name|default:"—" }}</td>
          <td class="whitespace-nowrap px-4 py-2.5 text-gray-600">{{ item.expiration_date|date:"Y-m-d"|default:"—" }}</td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
