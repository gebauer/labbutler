<div class="mt-2 overflow-x-auto rounded border bg-white">
  <table class="min-w-full divide-y divide-gray-200 text-sm">
    <thead class="bg-gray-50 text-left text-xs uppercase tracking-wide text-gray-500">
      <tr>
        <th class="px-3 py-2 font-medium">ID</th>
        <th class="px-3 py-2 font-medium">Name</th>
        <th class="px-3 py-2 font-medium">Location</th>
        <th class="px-3 py-2 font-medium">Vendor</th>
        <th class="px-3 py-2 font-medium">Expires</th>
      </tr>
    </thead>
    <tbody class="divide-y divide-gray-100">
      {% for item in page.object_list %}
        <tr class="hover:bg-gray-50">
          <td class="whitespace-nowrap px-3 py-2 font-mono text-xs text-gray-600">
            <a href="{% url 'inventory:item_detail' item.pk %}" class="hover:underline">{{ item.human_id }}</a>
          </td>
          <td class="px-3 py-2">
            <a href="{% url 'inventory:item_detail' item.pk %}" class="font-medium text-gray-900 hover:underline">{{ item.name }}</a>
          </td>
          <td class="px-3 py-2 text-gray-600">{{ item.location.name|default:"—" }}</td>
          <td class="px-3 py-2 text-gray-600">{{ item.vendor.name|default:"—" }}</td>
          <td class="whitespace-nowrap px-3 py-2 text-gray-600">{{ item.expiration_date|date:"Y-m-d"|default:"—" }}</td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
