{% extends "base.html" %}

{% block title %}Delete {{ config.singular }} · LabButler{% endblock %}

{% block content %}
  <h1 class="text-2xl font-semibold tracking-tight">Delete {{ config.singular }}</h1>
  <p class="mt-3 text-sm text-gray-700">Permanently delete <strong>{{ object }}</strong>? This cannot be undone.</p>
  <form method="post" class="mt-6 flex gap-2">
    {% csrf_token %}
    <button type="submit" class="rounded-lg bg-red-600 px-4 py-2 text-sm font-medium text-white hover:bg-red-700">Delete</button>
    <a href="{% url 'manage:list' kind=kind %}" class="rounded-lg border px-4 py-2 text-sm hover:bg-gray-50">Cancel</a>
  </form>
{% endblock %}
