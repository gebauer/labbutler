{% extends "base.html" %}

{% block title %}Edit member · Admin · LabButler{% endblock %}

{% block content %}
  <a href="{% url 'manage:members' %}" class="text-sm text-teal-700 hover:underline">← Members</a>
  <h1 class="mt-1 text-2xl font-semibold tracking-tight">Roles for {{ membership.user.display_name }}</h1>

  <form method="post" class="mt-6 max-w-xl">
    {% csrf_token %}
    <div class="space-y-1 text-sm text-gray-700 [&_label]:flex [&_label]:items-center [&_label]:gap-2 [&_input]:h-4 [&_input]:w-4 [&_input]:rounded [&_input]:text-teal-600">{{ form.roles }}</div>
    <div class="mt-6 flex gap-2">
      <button type="submit" class="rounded-lg bg-teal-600 px-4 py-2 text-sm font-medium text-white hover:bg-teal-700">Save</button>
      <a href="{% url 'manage:members' %}" class="rounded-lg border px-4 py-2 text-sm hover:bg-gray-50">Cancel</a>
    </div>
  </form>
{% endblock %}
