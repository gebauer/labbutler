{% extends "base.html" %}

{% block content %}
  <h1 class="text-2xl font-semibold tracking-tight">LabButler</h1>
  <p class="mt-2 text-gray-600">
    Self-hosted lab inventory and procurement.
  </p>
  {% if user.is_authenticated %}
    <a href="{% url 'inventory:item_list' %}"
       class="mt-4 inline-block rounded bg-teal-600 px-4 py-2 text-sm font-medium text-white hover:bg-teal-700">
      Go to inventory
    </a>
  {% else %}
    <a href="{% url 'login' %}"
       class="mt-4 inline-block rounded bg-teal-600 px-4 py-2 text-sm font-medium text-white hover:bg-teal-700">
      Sign in
    </a>
  {% endif %}
{% endblock %}
