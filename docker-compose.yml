# LabButler production stack.
#   cp .env.example .env   # then edit secrets/hosts
#   docker compose up -d --build
#   docker compose run --rm web python manage.py bootstrap_lab   # first run only
#
# Config is passed via ${VAR} interpolation (env values come from an auto-loaded .env for
# plain `docker compose`, or from the platform's env UI e.g. Coolify) — NOT env_file, so
# the variables reliably reach the containers. The web service migrates on start;
# collectstatic runs at image build time.

# Shared app configuration for web / worker / beat.
x-app-environment: &app-environment
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-}
  DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
  DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
  DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-}
  DJANGO_TIME_ZONE: ${DJANGO_TIME_ZONE:-Europe/Berlin}
  DJANGO_SECURE_SSL_REDIRECT: ${DJANGO_SECURE_SSL_REDIRECT:-true}
  # Defaults to the bundled db service, derived from the same POSTGRES_* vars that
  # initialize it — so the app password can never drift from the DB password. Override
  # DATABASE_URL directly to point at a managed database. NOTE: POSTGRES_PASSWORD must be
  # URL-safe (avoid @ : / ? #); otherwise set DATABASE_URL explicitly and URL-encode it.
  DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-labbutler}:${POSTGRES_PASSWORD:-labbutler}@db:5432/${POSTGRES_DB:-labbutler}}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://broker:6379/0}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://broker:6379/1}
  CELERY_TASK_ALWAYS_EAGER: ${CELERY_TASK_ALWAYS_EAGER:-false}
  DJANGO_MEDIA_ROOT: ${DJANGO_MEDIA_ROOT:-/data/media}
  DJANGO_EMAIL_BACKEND: ${DJANGO_EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
  EMAIL_HOST: ${EMAIL_HOST:-localhost}
  EMAIL_PORT: ${EMAIL_PORT:-587}
  EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
  EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
  EMAIL_USE_TLS: ${EMAIL_USE_TLS:-true}
  DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-labbutler@localhost}
  LABBUTLER_BASE_URL: ${LABBUTLER_BASE_URL:-}
  EXPIRY_DIGEST_DAYS: ${EXPIRY_DIGEST_DAYS:-30}
  EXPIRY_DIGEST_HOUR: ${EXPIRY_DIGEST_HOUR:-7}
  AXES_FAILURE_LIMIT: ${AXES_FAILURE_LIMIT:-5}
  AXES_COOLOFF_HOURS: ${AXES_COOLOFF_HOURS:-1}
  # Behind a reverse proxy (Coolify's Traefik = 1) so lockouts use the real client IP.
  AXES_IPWARE_PROXY_COUNT: ${AXES_IPWARE_PROXY_COUNT:-0}

services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-labbutler}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-labbutler}
      POSTGRES_DB: ${POSTGRES_DB:-labbutler}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-labbutler}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  broker:
    image: redis:7
    restart: unless-stopped

  web:
    build: .
    command: >
      sh -c "python manage.py migrate --noinput &&
             exec gunicorn labbutler.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    environment: *app-environment
    depends_on:
      db:
        condition: service_healthy
      broker:
        condition: service_started
    volumes:
      - media:/data/media
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  worker:
    build: .
    command: celery -A labbutler worker -l info
    environment: *app-environment
    depends_on:
      db:
        condition: service_healthy
      broker:
        condition: service_started
    volumes:
      - media:/data/media
    restart: unless-stopped

  beat:
    build: .
    command: celery -A labbutler beat -l info --schedule /tmp/celerybeat-schedule
    environment: *app-environment
    depends_on:
      db:
        condition: service_healthy
      broker:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata:
  media:
