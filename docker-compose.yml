# LabButler production stack.
#   cp .env.example .env   # then edit secrets/hosts
#   docker compose up -d --build
#   docker compose run --rm web python manage.py bootstrap_lab   # first run only
#
# The web service migrates on start; collectstatic runs at image build time.
services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-labbutler}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-labbutler}
      POSTGRES_DB: ${POSTGRES_DB:-labbutler}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-labbutler}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  broker:
    image: redis:7
    restart: unless-stopped

  web:
    build: .
    command: >
      sh -c "python manage.py migrate --noinput &&
             exec gunicorn labbutler.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      broker:
        condition: service_started
    volumes:
      - media:/data/media
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  worker:
    build: .
    command: celery -A labbutler worker -l info
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      broker:
        condition: service_started
    volumes:
      - media:/data/media
    restart: unless-stopped

  beat:
    build: .
    command: celery -A labbutler beat -l info --schedule /tmp/celerybeat-schedule
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      broker:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata:
  media:
